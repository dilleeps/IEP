name: Deploy API to Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: string
        default: "production"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - dev

env:
  GCP_PROJECT_ID: askiep-production
  GCP_REGION: us-central1
  AR_REPO: iep-apps
  SERVICE_NAME: iep-api-production
  SERVICE_ACCOUNT: iep-api-production-sa@askiep-production.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} \
            --location=${{ env.GCP_REGION }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.AR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }}"
          docker build -t "${IMAGE}" -t "${IMAGE%:*}:latest" ./app/api
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE }}"
          docker push "${{ env.IMAGE%:*}}:latest"

      - name: Verify image in Artifact Registry
        run: |
          gcloud artifacts docker images describe "${{ env.IMAGE }}" --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE }}" \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --add-cloudsql-instances=${{ secrets.CLOUDSQL_CONNECTION_NAME }} \
            --memory=1Gi --cpu=1 \
            --min-instances=0 --max-instances=2 \
            --timeout=900 \
            --set-env-vars="\
          NODE_ENV=production,\
          SERVER_PORT=3000,\
          API_SERVER_PORT=8080,\
          GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},\
          APP_ENVIRONMENT=production,\
          JWT_SECRET=${{ secrets.JWT_SECRET }},\
          JWT_EXPIRATION_TIME_IN_MINUTES=${{ secrets.JWT_EXPIRATION_TIME_IN_MINUTES }},\
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }},\
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }},\
          POSTGRES_DB=${{ secrets.POSTGRES_DB }},\
          POSTGRES_USER=${{ secrets.POSTGRES_USER }},\
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},\
          POSTGRES_SSL_MODE=${{ secrets.POSTGRES_SSL_MODE }},\
          CLOUDSQL_CONNECTION_NAME=${{ secrets.CLOUDSQL_CONNECTION_NAME }},\
          DB_SOCKET_PATH=/cloudsql/${{ secrets.CLOUDSQL_CONNECTION_NAME }},\
          RECAPTCHA_SECRET=${{ secrets.RECAPTCHA_SECRET }},\
          RECAPTCHA_MIN_SCORE=0.5,\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GEMINI_MODEL=gemini-flash-latest,\
          AI_MODEL=gemini-flash-latest,\
          AI_TEMPERATURE=0.3,\
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }},\
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }},\
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }},\
          FROM_EMAIL_ADDRESS=${{ secrets.FROM_EMAIL_ADDRESS }},\
          NOTIFY_EMAILS=${{ secrets.NOTIFY_EMAILS }},\
          TELEGRAM_API_KEY=${{ secrets.TELEGRAM_API_KEY }},\
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},\
          GCS_BUCKET=${{ secrets.GCS_BUCKET }},\
          GCS_CONFIG_BUCKET=${{ secrets.GCS_CONFIG_BUCKET }},\
          CONFIG_ENCRYPTION_KEY=${{ secrets.CONFIG_ENCRYPTION_KEY }},\
          LOCAL_BASE_FOLDER=/tmp/iep-uploads,\
          CONFIG_SOURCE_FOLDER=/tmp/iep-config,\
          ENABLE_S3=true" \
            --quiet

      - name: Get Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "### API Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE }}" >> $GITHUB_STEP_SUMMARY
